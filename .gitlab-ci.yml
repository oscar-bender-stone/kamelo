preprocessing:
    extends: .build-matrix
    stage: build
    only: [pushes]

    variables:
        FF_USE_FASTZIP: "true"
        K_VERSION: "5.2.103" # "5.0.1" # "5.2.82"

    script:
        - echo "--- Pre-processing"
        - sudo apt update
        - sudo apt install wget

        - echo "--- Pre-processing for OPAM"
        - if [ ! -d _opam ]; then echo "no local switch in the CI cache, we setup a new switch"; opam switch create --yes --no-install . $OCAML_VERSION; fi
